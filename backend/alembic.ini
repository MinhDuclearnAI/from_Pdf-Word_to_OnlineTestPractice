# A generic, single database configuration.

[alembic]
# Đường dẫn tới thư mục chứa các file cấu hình và migration scripts của Alembic
# Trong kiến trúc của chúng ta, thư mục này thường nằm ở backend/alembic
script_location = alembic

# BẤT QUY TẮC SỐ 1 (Quan trọng): Thêm thư mục hiện tại vào sys.path
# Điều này giúp file env.py của Alembic có thể import được thư mục 'app' (ví dụ: from app.models import Base)
prepend_sys_path = .

# BẤT QUY TẮC SỐ 2 (Best Practice): Đổi template tên file migration
# Thay vì sinh ra một dãy hash vô nghĩa (ví dụ: 8b3c7b2e_create_users.py), 
# ta chèn thêm mốc thời gian vào đầu file để các file tự động sắp xếp theo thứ tự thời gian sinh ra.
# Điều này giúp review code trên GitHub dễ dàng hơn gấp 10 lần.
file_template = %%(year)d_%%(month)d_%%(day)d_%%(hour)d%%(minute)d-%%(rev)s_%%(slug)s

# Cấu hình timezone để đồng bộ với ứng dụng FastAPI của bạn
timezone = Asia/Ho_Chi_Minh

# Ký tự phân cách các thư mục migration (os nghĩa là dùng dấu gạch chéo theo chuẩn HĐH)
version_path_separator = os

# Chuỗi kết nối Database mặc định.
# LƯU Ý: Ở môi trường thực tế, Senior Engineer KHÔNG BAO GIỜ hardcode URL vào đây.
# Giá trị này ở đây chỉ làm placeholder. Chúng ta sẽ ghi đè (override) nó trong file alembic/env.py 
# bằng cách đọc từ app.config.settings.SQLALCHEMY_DATABASE_URI để bảo mật tuyệt đối.
sqlalchemy.url = postgresql://user:pass@localhost/dbname


# ==========================================
# CẤU HÌNH LOGGING (CHUẨN PRODUCTION)
# ==========================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
# Cài đặt thành INFO nếu bạn muốn xem các câu lệnh SQL thô (CREATE TABLE, ALTER TABLE...)
# Cài đặt thành WARN trên Production để giảm rác log
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# Format log chuẩn, in ra thời gian, mức độ (INFO/WARN), tên module và nội dung
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S